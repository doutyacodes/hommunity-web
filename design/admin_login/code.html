<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hommunity Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#69ff87",
                        "outline": "#8b919d",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-surface": "#e5e2e1",
                        "on-primary": "#00315d",
                        "on-secondary-container": "#004d1b",
                        "on-tertiary": "#313030",
                        "primary-container": "#4d93e5",
                        "secondary": "#40e56c",
                        "tertiary-container": "#929090",
                        "inverse-surface": "#e5e2e1",
                        "surface-variant": "#353534",
                        "inverse-primary": "#0060ac",
                        "on-primary-container": "#002a51",
                        "on-surface-variant": "#c1c7d3",
                        "on-tertiary-fixed": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "surface-container-highest": "#353534",
                        "on-tertiary-container": "#2a2a29",
                        "secondary-fixed-dim": "#3ce36a",
                        "outline-variant": "#414751",
                        "background": "#131313",
                        "surface-dim": "#131313",
                        "on-primary-fixed-variant": "#004883",
                        "on-tertiary-fixed-variant": "#474646",
                        "error": "#ffb4ab",
                        "error-container": "#93000a",
                        "surface": "#131313",
                        "tertiary-fixed": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "tertiary": "#c8c6c5",
                        "surface-tint": "#a4c9ff",
                        "primary-fixed": "#d4e3ff",
                        "surface-container-low": "#1c1b1b",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-bright": "#393939",
                        "on-secondary-fixed": "#002108",
                        "on-secondary-fixed-variant": "#00531e",
                        "on-secondary": "#003912",
                        "surface-container-lowest": "#0e0e0e",
                        "on-background": "#e5e2e1",
                        "primary": "#a4c9ff",
                        "on-error": "#690005",
                        "on-primary-fixed": "#001c39",
                        "secondary-container": "#02c953"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .blueprint-bg {
            background-color: #131313;
            background-image: 
                linear-gradient(rgba(164, 201, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(164, 201, 255, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(164, 201, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(164, 201, 255, 0.02) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center p-6 blueprint-bg overflow-hidden">
<!-- Background Decorative Element -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Header (Based on Shared Components JSON) -->
<header class="mb-10 text-center">
<div class="inline-flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">domain</span>
<h1 class="text-3xl font-headline font-extrabold tracking-tighter text-primary">Hommunity</h1>
</div>
<p class="text-on-surface-variant font-headline tracking-tight uppercase text-xs font-bold opacity-80">Architectural Ledger</p>
</header>
<!-- Glassmorphic Form Card -->
<div class="glass-panel p-8 md:p-10 rounded-xl shadow-[0px_20px_40px_rgba(0,0,0,0.4)] border border-outline-variant/20">
<div class="mb-8">
<h2 class="text-2xl font-headline font-bold text-on-surface mb-2">Admin Portal</h2>
<p class="text-on-surface-variant text-sm">Secure access to the community management ledger.</p>
</div>
<form class="space-y-6">
<!-- Segmented Control (Toggle) -->
<div class="p-1 bg-surface-container-lowest rounded-xl flex gap-1">
<button class="flex-1 py-2 px-4 text-xs font-headline font-bold rounded-lg transition-all duration-300 bg-surface-container-highest text-primary shadow-lg" type="button">
                        Super Admin
                    </button>
<button class="flex-1 py-2 px-4 text-xs font-headline font-bold rounded-lg transition-all duration-300 text-on-surface-variant hover:text-on-surface" type="button">
                        Admin
                    </button>
</div>
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-headline font-bold text-on-surface-variant uppercase tracking-wider" for="email">Access Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">alternate_email</span>
<input class="w-full bg-surface-container-highest border-0 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="email" placeholder="admin@hommunity.sys" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-xs font-headline font-bold text-on-surface-variant uppercase tracking-wider" for="password">Security Key</label>
<a class="text-[10px] font-headline font-bold text-primary uppercase hover:underline decoration-2 underline-offset-4" href="#">Reset Credentials</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">lock</span>
<input class="w-full bg-surface-container-highest border-0 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="password" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl cursor-pointer hover:text-on-surface">visibility</span>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-extrabold text-sm uppercase tracking-widest shadow-[0_10px_20px_-5px_rgba(164,201,255,0.3)] hover:shadow-[0_15px_30px_-5px_rgba(164,201,255,0.4)] active:scale-[0.98] transition-all duration-300" type="submit">
                    Authorize Access
                </button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
</span>
<span class="text-[10px] font-headline font-bold text-on-surface-variant uppercase tracking-widest">System Online</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-lg hover:text-primary cursor-pointer transition-colors" data-icon="security" title="Encrypted Connection">security</span>
<span class="material-symbols-outlined text-on-surface-variant text-lg hover:text-primary cursor-pointer transition-colors" data-icon="info" title="System Info">info</span>
</div>
</div>
</div>
<!-- Footer Meta -->
<footer class="mt-10 text-center">
<p class="text-[10px] font-headline font-medium text-outline uppercase tracking-[0.2em] opacity-60">
                © 2024 Hommunity Systems • Proprietary Management Software
            </p>
</footer>
</main>
<!-- Side Graphic (Architectural Visual) - Only visible on larger screens -->
<div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/3 p-12 select-none opacity-20 hover:opacity-30 transition-opacity duration-700">
<div class="h-full border-l border-primary/20 flex flex-col justify-end">
<div class="space-y-6">
<div class="w-full h-1 bg-gradient-to-r from-primary/40 to-transparent"></div>
<div class="w-3/4 h-1 bg-gradient-to-r from-primary/20 to-transparent"></div>
<div class="w-1/2 h-1 bg-gradient-to-r from-primary/10 to-transparent"></div>
</div>
<div class="mt-12">
<img alt="Modern skyscraper structure" class="w-full h-96 object-cover rounded-xl grayscale" data-alt="Monochrome architectural view of a high-tech modern skyscraper reaching into a dark sky with sharp geometric lines and glass reflections" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAI8F4wkENM42gPAYlz85Rd-d1w5SVt7ubnRench__73bP0NILIR6sVYiTtpctBceFnbfS4FmJQBunDF9udURgAtipA-8t0L2gQgZk6X7ZFjzUeeFbXLv6BeWw30sF7GTUvGfjWAwwRivf9v_hTm6k1BO-ZA4yi6rgDgSBGMGlZpI-_Hqy5QviekBeqOHQx-1JkJznhAqoPcG923d9NGa6mFGksFEddxkdnX3t0wbO4B1QZZZacAVappvGk6e2vsCh60jagZ8QCGZte"/>
</div>
<div class="mt-8">
<p class="font-headline font-black text-6xl text-on-surface/5 leading-none">STRUCTURAL<br/>INTEGRITY</p>
</div>
</div>
</div>
</body></html>
